name: Pull Request Validation

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, ready_for_review ]

permissions:
  contents: read
  pull-requests: write

jobs:
  conventional-commits:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.status.outputs.status }}
    steps:
      - name: Check conventional commits
        uses: helpers4/action/conventional-commits@main
        with:
          checkout: "true"
          pr-comment: "error"

      - name: Set status
        id: status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

  shellcheck:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.status.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run ShellCheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck -S warning conventional-commits/scripts/validate.sh

      - name: Set status
        id: status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

  test-action:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.status.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Test: valid conventional commit"
        run: |
          # Test with known valid commits from this repo
          INPUT_BASE_SHA="" \
          INPUT_HEAD_SHA="" \
          INPUT_TYPES="feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert" \
          INPUT_SCOPES="" \
          INPUT_REQUIRE_SCOPE="false" \
          INPUT_IGNORE_COMMITS="^Merge branch|^Initial commit" \
          INPUT_VALIDATE_PR_TITLE="false" \
          INPUT_PR_COMMENT="none" \
          GITHUB_BASE_REF="main" \
          bash conventional-commits/scripts/validate.sh || true

      - name: "Test: script is executable and has valid syntax"
        run: bash -n conventional-commits/scripts/validate.sh

      - name: Set status
        id: status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

  pr-comment:
    runs-on: ubuntu-latest
    needs: [ conventional-commits, shellcheck, test-action ]
    if: always()
    steps:
      - name: Update PR comment
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const jobs = {
              '🧾 Conventional Commits': "${{ needs.conventional-commits.outputs.status || 'unknown' }}",
              '🐚 ShellCheck': "${{ needs.shellcheck.outputs.status || 'unknown' }}",
              '🧪 Action Tests': "${{ needs.test-action.outputs.status || 'unknown' }}",
            };

            const rows = Object.entries(jobs).map(([job, status]) => {
              const icon = status === 'success' ? '✅' :
                         status === 'failure' ? '❌' :
                         status === 'skipped' ? '⏭️' : '⚠️';
              const badge = status === 'success' ? '`passing`' :
                           status === 'failure' ? '`failing`' :
                           status === 'skipped' ? '`skipped`' : '`unknown`';
              return `| ${icon} | **${job}** | ${badge} |`;
            }).join('\n');

            const passedCount = Object.values(jobs).filter(s => s === 'success').length;
            const totalJobs = Object.keys(jobs).length;
            const allPassed = passedCount === totalJobs;

            const statusBanner = allPassed
              ? '## ✅ PR Validation Passed\n\n> All checks passed!'
              : `## ❌ PR Validation Failed\n\n> ${passedCount}/${totalJobs} checks passed`;

            const comment = `${statusBanner}

            ---

            ### 📋 Pipeline Status

            | | Job | Status |
            |:---:|-----|:------:|
            ${rows}

            ---

            <sub>🤖 Generated by **@helpers4** CI • ${new Date().toISOString().split('T')[0]}</sub>`;

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const botComment = comments.find(c =>
                c.user.type === 'Bot' && c.body.includes('PR Validation')
              );

              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: comment
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: comment
                });
              }
            } catch (error) {
              console.error('Error updating PR comment:', error);
            }
